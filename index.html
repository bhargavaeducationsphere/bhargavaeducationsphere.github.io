<style>
:root{
--blue1:#0a3d62;
--blue2:#1e90ff;
--accent:#ff9f1a;
--wa:#25D366;
--map:#34a853;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#e9f0ff,#ffffff);
color:#222;
-webkit-font-smoothing:antialiased;
-webkit-tap-highlight-color:transparent;
padding-bottom:70px; /* space for sticky bar */
}

/* ===== STICKY BOTTOM BAR ===== */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
box-shadow:0 -5px 20px rgba(0,0,0,.15);
z-index:1000;
}

.sticky-bar a{
flex:1;
text-align:center;
padding:14px 5px;
text-decoration:none;
font-weight:600;
font-size:14px;
color:white;
}

.sticky-call{background:var(--blue1);}
.sticky-wa{background:var(--wa);}
.sticky-register{background:var(--blue2);}

/* ===== WHATSAPP POPUP ===== */
.wa-popup{
position:fixed;
bottom:90px;
right:20px;
background:white;
padding:15px;
border-radius:18px;
box-shadow:0 15px 30px rgba(0,0,0,.2);
width:260px;
display:none;
animation:fadeUp .5s ease;
z-index:1000;
}

.wa-popup p{
margin:0 0 10px;
font-size:14px;
}

.wa-popup button{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-weight:600;
cursor:pointer;
}

.close-popup{
position:absolute;
top:8px;
right:12px;
cursor:pointer;
font-weight:bold;
color:#888;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:none}
}
</style>
</head>
